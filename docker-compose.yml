services:
  db_mongo:
    build:
      context: ./mongo
      dockerfile: Dockerfile
    container_name: db_mongo
    restart: on-failure
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_DATABASE: ${MONGO_DATABASE}
    volumes:
      - mongo_data:/data/db
    networks:
      - backend
    healthcheck:
      test: >
        mongosh --username $$MONGO_INITDB_ROOT_USERNAME
        --password $$MONGO_INITDB_ROOT_PASSWORD
        --authenticationDatabase admin
        --eval "db = db.getSiblingDB('blog_db'); if (db.posts.countDocuments() === 5) { quit(0); } else { quit(1); }"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  db_mysql:
    image: mysql:9.6
    container_name: db_mysql
    restart: on-failure
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - backend
    healthcheck:
      test: >
        mysql -u$$MYSQL_USER -p$$MYSQL_PASSWORD -D $$MYSQL_DATABASE
        -e "SELECT COUNT(*) FROM utilisateurs;"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  admin_mongo:
    image: mongo-express:latest
    container_name: admin_mongo
    restart: on-failure
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_SERVER: db_mongo
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD}
    ports:
      - "8081:8081"
    depends_on:
      db_mongo:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:8081', res => process.exit(res.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  admin_mysql:
    image: adminer:latest
    container_name: admin_mysql
    restart: on-failure
    ports:
      - "8080:8080"
    depends_on:
      db_mysql:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: api
    restart: on-failure
    environment:
      MYSQL_HOST: db_mysql
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MONGO_HOST: db_mongo
      MONGO_PORT: 27017
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_DATABASE: ${MONGO_DATABASE}
    ports:
      - "${API_PORT}:8000"
    depends_on:
      db_mongo:
        condition: service_healthy
      db_mysql:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: >
        python -c "import requests;
        r1=requests.get('http://localhost:8000/posts', timeout=3);
        r2=requests.get('http://localhost:8000/users', timeout=3);
        exit(0 if r1.status_code == 200 and r2.status_code == 200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mongo_data:
  mysql_data:

networks:
  backend:
    driver: bridge